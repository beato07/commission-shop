{% extends "base.html" %}

{% block content %}
<h1>Список продаж</h1>
<a href="{{ url_for('add_sale') }}" class="btn btn-primary mb-3">
    <i class="fas fa-plus"></i> Добавить продажу
</a>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Дата продажи</th>
            <th>Цена продажи</th>
            <th>Комиссия</th>
            <th>Статус</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for sale in sales %}
        <tr>
            <td>{{ sale.sale_date }}</td>
            <td>{{ sale.sale_price }}</td>
            <td>{{ sale.commission }}</td>
            <td>{{ sale.status }}</td>
            <td>
                <a href="{{ url_for('sale_detail', sale_id=sale.id) }}" class="btn btn-primary btn-sm">
                    <i class="fas fa-eye"></i> Показать
                </a>
                <form action="{{ url_for('delete_sale', sale_id=sale.id) }}" method="POST" style="display:inline;">
                    <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Вы уверены, что хотите удалить продажу?');">
                        <i class="fas fa-trash-alt"></i> Удалить
                    </button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
