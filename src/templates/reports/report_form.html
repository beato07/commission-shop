{% extends "base.html" %}

{% block content %}
<h1>{{ "Редактирование отчёта" if report else "Добавление отчёта" }}</h1>

<form method="POST" id="reportForm">
    <div class="form-group">
        <label for="number">Номер отчёта:</label>
        <input type="text" id="number" name="number" class="form-control" required
               value="{{ report.number if report else '' }}">
    </div>
    <div class="form-group">
        <label for="date">Дата:</label>
        <input type="date" id="date" name="date" class="form-control" required
               value="{{ report.date if report else '' }}">
    </div>
    <div class="form-group">
        <label for="report_type">Тип отчёта:</label>
        <input type="text" id="report_type" name="report_type" class="form-control" required
               value="{{ report.report_type if report else '' }}">
    </div>
    <div class="form-group">
        <label for="description">Описание:</label>
        <textarea id="description" name="description" class="form-control" required>{{ report.description if report else '' }}</textarea>
    </div>
    <div class="form-group">
        <label for="consignor_id">Комитент:</label>
        <select id="consignor_id" name="consignor_id" class="form-control">
            <option value="">Выбрать комитента</option>
            {% for consignor in consignors %}
                <option value="{{ consignor.id }}"
                        {% if report and report.consignor_id == consignor.id %}selected{% endif %}>
                    {{ consignor.last_name }} {{ consignor.first_name }} {{ consignor.middle_name|default('') }}
                </option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-primary">{{ "Сохранить" if report else "Добавить" }}</button>
    <a href="{{ url_for('reports_list') }}" class="btn btn-secondary">
        Отмена
    </a>
</form>
{% endblock %}
